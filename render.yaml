# kpa_health_api/render.yaml
services:
  - type: web
    name: kpa-health-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: DB_TYPE
        value: "postgresql"
      - key: DATABASE_URL
        sync: false